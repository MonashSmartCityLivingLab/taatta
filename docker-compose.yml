services:
  collector:
    build:
      context: .
      target: collector
    command: java -jar -Dspring.profiles.active=prod /usr/local/taatta/collector.jar
    environment:
      - TAATTA_MOSQUITTO_HOST=${TAATTA_MOSQUITTO_HOST}
      - TAATTA_MOSQUITTO_PORT=${TAATTA_MOSQUITTO_PORT}
    depends_on:
      - mosquitto
    restart: unless-stopped
  rhs1s001:
    build:
      context: .
      target: rhs1s001
    command: java -jar -Dspring.profiles.active=prod /usr/local/taatta/rhs1s001.jar
    ports:
      - 4040:4040
    environment:
      - TAATTA_POSTGRES_HOST=${TAATTA_POSTGRES_HOST}
      - TAATTA_POSTGRES_PORT=${TAATTA_POSTGRES_PORT}
      - TAATTA_POSTGRES_USER=${TAATTA_POSTGRES_USER}
      - TAATTA_POSTGRES_PASSWORD=${TAATTA_POSTGRES_PASSWORD}
    depends_on:
      postgresql:
        condition: service_healthy
    restart: unless-stopped
  pcr2:
    build:
      context: .
      target: pcr2
    command: java -jar -Dspring.profiles.active=prod /usr/local/taatta/pcr2.jar
    ports:
      - 4048:4048
    environment:
      - TAATTA_POSTGRES_HOST=${TAATTA_POSTGRES_HOST}
      - TAATTA_POSTGRES_PORT=${TAATTA_POSTGRES_PORT}
      - TAATTA_POSTGRES_USER=${TAATTA_POSTGRES_USER}
      - TAATTA_POSTGRES_PASSWORD=${TAATTA_POSTGRES_PASSWORD}
    depends_on:
      postgresql:
        condition: service_healthy
    restart: unless-stopped
  athom-smart-plug:
    build:
      context: .
      target: athom-smart-plug
    command: java -jar -Dspring.profiles.active=prod /usr/local/taatta/athom-smart-plug.jar
    ports:
      - 4050:4050
    environment:
      - TAATTA_POSTGRES_HOST=${TAATTA_POSTGRES_HOST}
      - TAATTA_POSTGRES_PORT=${TAATTA_POSTGRES_PORT}
      - TAATTA_POSTGRES_USER=${TAATTA_POSTGRES_USER}
      - TAATTA_POSTGRES_PASSWORD=${TAATTA_POSTGRES_PASSWORD}
    depends_on:
      postgresql:
        condition: service_healthy
    restart: unless-stopped
  # Chirpstack containers
  # Based on the official template docker-compose.yml at
  # https://github.com/chirpstack/chirpstack-docker/blob/master/docker-compose.yml
  chirpstack:
    image: chirpstack/chirpstack:4
    command: -c /etc/chirpstack
    restart: unless-stopped
    volumes:
      - ./configuration/chirpstack:/etc/chirpstack
      - ./lorawan-devices:/opt/lorawan-devices
    depends_on:
      - postgres
      - mosquitto
      - redis
    environment:
      - MQTT_BROKER_HOST=${TAATTA_MOSQUITTO_HOST}
      - TAATTA_MOSQUITTO_PORT=${TAATTA_MOSQUITTO_PORT}
      - REDIS_HOST=${TAATTA_REDIS_HOST}
      - POSTGRESQL_HOST=${TAATTA_POSTGRES_HOST}
      - TAATTA_POSTGRES_PASSWORD=${TAATTA_POSTGRES_PASSWORD}
      - CHIRPSTACK_SECRET=${CHIRPSTACK_SECRET}
    ports:
      - 8080:8080
  chirpstack-gateway-bridge-au915:
    image: chirpstack/chirpstack-gateway-bridge:4
    restart: unless-stopped
    ports:
      - 1700:1700/udp
    volumes:
      - ./configuration/chirpstack-gateway-bridge:/etc/chirpstack-gateway-bridge
    depends_on:
      - mosquitto
    environment:
      - TAATTA_MOSQUITTO_HOST=${TAATTA_MOSQUITTO_HOST}
      - TAATTA_MOSQUITTO_PORT=${TAATTA_MOSQUITTO_PORT}
  chirpstack-rest-api:
    image: chirpstack/chirpstack-rest-api:4
    restart: unless-stopped
    command: --server chirpstack:8080 --bind 0.0.0.0:8090 --insecure
    ports:
      - 8090:8090
    depends_on:
      - chirpstack
  postgresql:
    image: postgres:15-alpine
    environment:
      - POSTGRES_PASSWORD=${ADMIN_POSTGRES_PASSWORD}
      - TAATTA_POSTGRES_USER=${TAATTA_POSTGRES_USER}
      - TAATTA_POSTGRES_PASSWORD=${TAATTA_POSTGRES_PASSWORD}
    volumes:
      - ./configuration/postgresql/initdb:/docker-entrypoint-initdb.d
      - postgresqldata:/var/lib/postgresql/data
    # Uncomment to expose ports
#    ports:
#      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  redis:
    image: redis:5-alpine
    volumes:
      - redisdata:/data
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - 1883:1883
    volumes:
      - ./configuration/eclipse-mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
    restart: unless-stopped

volumes:
  postgresqldata:
  redisdata: